# Kernel Compatibility Configuration for Modern eBPF
# This file tracks which kernel versions are compatible with the modern eBPF driver

# Minimum kernel version required (major.minor.patch)
MIN_KERNEL_VERSION=5.8.0

# Known incompatible kernel versions (will be blocked)
# Format: major.minor (blocks all patch versions)
INCOMPATIBLE_VERSIONS=6.18

# Notes:
# - Kernel 6.18+ has syscall table and BPF verifier changes
# - Waiting for falcosecurity-libs update to support 6.18+
# - See: https://github.com/falcosecurity/falco/issues/3813
