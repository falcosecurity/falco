# falco-rules-5.1.0

tests:
  - name: create_hardlink_over_sensitive_files
    rule: "Create Hardlink Over Sensitive Files"
    description: "link()/linkat() over each sensitive file fires the rule"
    runner: HostRunner
    before: "rm -f /root/eg_hardlink"
    resources:
      - type: fd
        name: target
        subtype: file
        filePath: "%{ item.target }"
    steps:
      - type: syscall
        name: hl
        syscall: "%{ item.syscall }"
        args:
          oldPath: "%{ item.target }"
          newPath: /root/eg_hardlink
    expectedOutcome:
      source: syscall
      priority: warning
      outputFields:
        evt.arg.oldpath: "%{ item.target }"
        evt.arg.newpath: /root/eg_hardlink
    cases:
      - strategy: matrix
        values:
          syscall: [link, linkat]
          target: [/etc/shadow, /etc/sudoers, /etc/pam.conf, /etc/security/pwquality.conf]
