# falco-rules-5.1.0

tests:
  - name: search_private_keys_or_passwords_grep
    rule: "Search Private Keys or Passwords"
    description: "grep/egrep/fgrep searching for a private-key header fires the rule"
    runner: HostRunner
    context:
      processes:
        - name: "%{ item.gname }"
          args: "%{ item.pattern }"
    expectedOutcome:
      source: syscall
      priority: warning
      outputFields:
        proc.name: "%{ item.gname }"
    cases:
      - strategy: matrix
        values:
          gname: [grep, egrep, fgrep]
          pattern:
            - "BEGIN PRIVATE"
            - "BEGIN OPENSSH PRIVATE"
            - "BEGIN RSA PRIVATE"
            - "BEGIN DSA PRIVATE"
            - "BEGIN EC PRIVATE"

  - name: search_private_keys_or_passwords_find
    rule: "Search Private Keys or Passwords"
    description: "find searching for an ssh key filename fires the rule"
    runner: HostRunner
    context:
      processes:
        - name: find
          args: "%{ item.idfile }"
    expectedOutcome:
      source: syscall
      priority: warning
      outputFields:
        proc.name: find
    cases:
      - strategy: matrix
        values:
          idfile: [id_rsa, id_dsa, id_ed25519, id_ecdsa]
