# falco-rules-5.1.0

tests:
  - name: read_sensitive_file_untrusted_open
    rule: "Read sensitive file untrusted"
    description: "open() read of each sensitive target fires the rule"
    runner: HostRunner
    resources:
      - type: fd
        name: target
        subtype: file
        filePath: "%{ item.target }"
    steps:
      - type: syscall
        name: op
        syscall: open
        args:
          pathname: "%{ item.target }"
          flags: O_RDONLY
    expectedOutcome:
      source: syscall
      priority: warning
      outputFields:
        fd.name: "%{ item.target }"
    cases:
      - strategy: matrix
        values:
          target:
            - /etc/shadow
            - /etc/sudoers
            - /etc/pam.conf
            - /etc/security/pwquality.conf
            - /etc/sudoers.d/eg_read_sensitive
            - /etc/pam.d/eg_read_sensitive

