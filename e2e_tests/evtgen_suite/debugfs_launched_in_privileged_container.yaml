# falco-rules-5.1.0

tests:
  - name: debugfs_launched_in_privileged_container
    rule: "Debugfs Launched in Privileged Container"
    description: "a process named debugfs spawning in a privileged container fires the rule"
    runner: HostRunner
    context:
      container: {}
      processes:
        - name: debugfs
    expectedOutcome:
      source: syscall
      priority: warning
      outputFields:
        proc.name: debugfs
