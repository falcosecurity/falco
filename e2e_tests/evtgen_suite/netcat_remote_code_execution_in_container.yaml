# falco-rules-5.1.0

tests:
  - name: netcat_remote_code_execution_in_container
    rule: "Netcat Remote Code Execution in Container"
    description: "nc/ncat with an exec flag inside a container fires the rule"
    runner: HostRunner
    context:
      container: {}
      processes:
        - name: "%{ item.name }"
          args: "%{ item.args }"
    expectedOutcome:
      source: syscall
      priority: warning
      outputFields:
        proc.name: "%{ item.name }"
    cases:
      - strategy: matrix
        values:
          name: [nc]
          args: ["-e /bin/sh", "-c /bin/sh"]
      - strategy: matrix
        values:
          name: [ncat]
          args: ["--sh-exec /bin/sh", "--exec /bin/sh", "-e /bin/sh", "-c /bin/sh", "--lua-exec /bin/sh"]
