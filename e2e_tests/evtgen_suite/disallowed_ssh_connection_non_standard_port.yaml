# falco-rules-5.1.0

tests:
  - name: disallowed_ssh_connection_non_standard_port
    rule: "Disallowed SSH Connection Non Standard Port"
    description: "ssh connecting to a public IP on a non-standard port fires the rule"
    runner: HostRunner
    context:
      processes:
        - name: ssh
    resources:
      - type: clientServer
        name: cs
        l4Proto: tcp4
        address: "%{ item.addr }"
    expectedOutcome:
      source: syscall
      priority: notice
      outputFields:
        proc.name: ssh
        fd.l4proto: tcp
    cases:
      - strategy: matrix
        values:
          addr:
            - "203.0.113.10:80"
            - "203.0.113.10:8080"
            - "203.0.113.10:88"
            - "203.0.113.10:443"
            - "203.0.113.10:8443"
            - "203.0.113.10:53"
            - "203.0.113.10:4444"
