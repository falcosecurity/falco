# falco-rules-5.1.0

tests:
  - name: execution_from_dev_shm_exe
    rule: "Execution from /dev/shm"
    description: "a process whose argv[0] is under /dev/shm fires the rule (proc.exe branch)"
    runner: HostRunner
    context:
      container: "%{ item.container }"
      processes:
        - name: eg_devshm
          exe: /dev/shm/eg_devshm
    expectedOutcome:
      source: syscall
      priority: warning
      outputFields:
        proc.name: eg_devshm
    cases:
      - strategy: matrix
        values:
          container: [null, {}]

  - name: execution_from_dev_shm_shell
    rule: "Execution from /dev/shm"
    description: "a shell whose args reference /dev/shm fires the rule (shell_procs branches)"
    runner: HostRunner
    context:
      container: "%{ item.container }"
      processes:
        - name: "%{ item.shell }"
          args: "%{ item.shellargs }"
    expectedOutcome:
      source: syscall
      priority: warning
      outputFields:
        proc.name: "%{ item.shell }"
    cases:
      - strategy: matrix
        values:
          container: [null, {}]
          shell: [ash, bash, csh, ksh, sh, tcsh, zsh, dash]
          shellargs: ["-c /dev/shm/evil", "-i /dev/shm/evil", "/dev/shm/evil"]
