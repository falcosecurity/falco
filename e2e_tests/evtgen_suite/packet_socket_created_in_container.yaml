# falco-rules-5.1.0

tests:
  - name: packet_socket_created_in_container
    rule: "Packet socket created in container"
    description: "creating an AF_PACKET socket inside a container fires the rule"
    runner: HostRunner
    context:
      container: {}
      processes:
        - name: eg_packet
    steps:
      - type: syscall
        name: s
        syscall: socket
        args:
          domain: AF_PACKET
          type: SOCK_RAW
          protocol: 0
    expectedOutcome:
      source: syscall
      priority: notice
      outputFields:
        proc.name: eg_packet
