# falco-rules-5.1.0

tests:
  - name: directory_traversal_monitored_file_read_open
    rule: "Directory traversal monitored file read"
    description: "open() of a monitored file via a two-segment '../' path fires the rule"
    runner: HostRunner
    resources:
      - type: fd
        name: target
        subtype: file
        filePath: "%{ item.fdname }"
    steps:
      - type: syscall
        name: op
        syscall: open
        args:
          pathname: "%{ item.pathname }"
          flags: O_RDONLY
    expectedOutcome:
      source: syscall
      priority: warning
      outputFields:
        fd.name: "%{ item.fdname }"
        fd.nameraw: "%{ item.pathname }"
    cases:
      - strategy: vector
        values:
          pathname: "/etc/../etc/../etc/shadow"
          fdname: "/etc/shadow"
      - strategy: vector
        values:
          pathname: "/tmp/../tmp/../tmp/eg_id_rsa"
          fdname: "/tmp/eg_id_rsa"
      - strategy: vector
        values:
          pathname: "/root/../root/../root/.ssh/eg_traversal_key"
          fdname: "/root/.ssh/eg_traversal_key"
      - strategy: vector
        values:
          pathname: "/home/eg_dirtraversal/../eg_dirtraversal/../eg_dirtraversal/.ssh/eg_traversal_key"
          fdname: "/home/eg_dirtraversal/.ssh/eg_traversal_key"

