# falco-rules-5.1.0

tests:
  - name: fileless_execution_via_memfd_create
    rule: "Fileless execution via memfd_create"
    description: "executing a binary from an anonymous memfd (fileless) fires the rule"
    runner: HostRunner
    resources:
      - type: process
        name: eg_memfd
        fileLess: true
    expectedOutcome:
      source: syscall
      priority: critical
      outputFields:
        evt.arg.flags: "EXE_WRITABLE|EXE_FROM_MEMFD"
