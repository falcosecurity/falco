# falco-rules-5.1.0

tests:
  - name: remove_bulk_data_from_disk
    rule: "Remove Bulk Data from Disk"
    description: "spawning a process named shred/mkfs/mke2fs fires the rule"
    runner: HostRunner
    context:
      processes:
        - name: "%{ item.procname }"
    expectedOutcome:
      source: syscall
      priority: warning
      outputFields:
        proc.name: "%{ item.procname }"
    cases:
      - strategy: matrix
        values:
          procname: [shred, mkfs, mke2fs]
