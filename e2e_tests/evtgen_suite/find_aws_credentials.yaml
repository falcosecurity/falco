# falco-rules-5.1.0

tests:
  - name: find_aws_credentials_grep
    rule: "Find AWS Credentials"
    description: "grep/egrep/fgrep for an AWS credential string fires the rule"
    runner: HostRunner
    context:
      processes:
        - name: "%{ item.gname }"
          args: "%{ item.awsstring }"
    expectedOutcome:
      source: syscall
      priority: warning
      outputFields:
        proc.name: "%{ item.gname }"
    cases:
      - strategy: matrix
        values:
          gname: [grep, egrep, fgrep]
          awsstring: [aws_access_key_id, aws_secret_access_key, aws_session_token, accesskeyid, secretaccesskey]

  - name: find_aws_credentials_find
    rule: "Find AWS Credentials"
    description: "find targeting a path ending in .aws/credentials fires the rule"
    runner: HostRunner
    context:
      processes:
        - name: find
          args: /root/.aws/credentials
    expectedOutcome:
      source: syscall
      priority: warning
      outputFields:
        proc.name: find
