# falco-rules-5.1.0

tests:
  - name: run_shell_untrusted_direct_spawner
    rule: "Run shell untrusted"
    description: "a shell whose direct parent is a protected (non-shell, non-excluded) binary fires the rule"
    runner: HostRunner
    context:
      processes:
        - name: "%{ item.spawner }"
        - name: "%{ item.shell }"
    expectedOutcome:
      source: syscall
      priority: notice
      outputFields:
        proc.name: "%{ item.shell }"
        proc.pname: "%{ item.spawner }"
    cases:
      - strategy: matrix
        values:
          shell: [ash, bash, csh, ksh, sh, tcsh, zsh, dash]
          spawner:
            # direct names (protected_shell_spawning_binaries minus PM2/runsv)
            - fluentd
            - flanneld
            - splunkd
            - consul
            - smbd
            # http_server_binaries
            - nginx
            - httpd
            - httpd-foregroun
            - lighttpd
            - apache
            - apache2
            # db_server_binaries
            - mysqld
            - postgres
            - sqlplus
            # nosql_server_binaries
            - couchdb
            - memcached
            - redis-server
            - rabbitmq-server
            - mongod
            # mail_binaries
            - sendmail
            - sendmail-msp
            - postfix
            - procmail
            - exim4
            - pickup
            - showq
            - mailq
            - dovecot
            - imap-login
            - imap
            - mailmng-core
            - pop3-login
            - dovecot-lda
            - pop3

  - name: run_shell_untrusted_ancestor_spawner
    rule: "Run shell untrusted"
    description: "a shell whose protected spawner is a grandparent (direct parent is excluded) fires the rule"
    runner: HostRunner
    context:
      processes:
        - name: "%{ item.spawner }"
        - name: eg_middle
        - name: "%{ item.shell }"
    expectedOutcome:
      source: syscall
      priority: notice
      outputFields:
        proc.name: "%{ item.shell }"
        proc.pname: eg_middle
    cases:
      - strategy: matrix
        values:
          shell: [ash, bash, csh, ksh, sh, tcsh, zsh, dash]
          spawner: [PM2, runsv]

  - name: run_shell_untrusted_java_parent
    rule: "Run shell untrusted"
    description: "a shell whose direct parent is a java process running a monitored framework fires the rule"
    runner: HostRunner
    context:
      processes:
        - name: java
          args: "%{ item.marker }"
        - name: "%{ item.shell }"
    expectedOutcome:
      source: syscall
      priority: notice
      outputFields:
        proc.name: "%{ item.shell }"
        proc.pname: java
    cases:
      - strategy: matrix
        values:
          shell: [ash, bash, csh, ksh, sh, tcsh, zsh, dash]
          marker:
            - org.apache.zookeeper.server
            - kafka.Kafka
            - org.elasticsearch.bootstrap.Elasticsearch
            - activemq.jar
            - org.apache.cassandra.service.CassandraDaemon
            - org.jboss
            - com.sun.enterprise.glassfish
            - org.apache.hadoop
            - com.datastax
