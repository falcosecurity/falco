{{- if or .Values.falcoctl.artifact.install.enabled .Values.falcoctl.artifact.follow.enabled }}
{{- if .Values.extra.registryCustomCaCert.enabled }}
apiVersion: v1
kind: Secret
type: Opaque
metadata:
  name: {{ include "falco.fullname" . }}-falcoctl-registry-cacert
  namespace: {{ include "falco.namespace" . }}
  labels:
    {{- include "falco.labels" . | nindent 4 }}
data:
  registry-cacert.pem: |-
    {{- toYaml .Values.extra.registryCustomCaCert.cacert | nindent 4 }}
{{- end }}
{{- end }}